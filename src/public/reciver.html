<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cubo Controlado por WebSocket</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      color: white;
      font-family: sans-serif;
    }

    .scene {
      width: 200px;
      height: 200px;
      perspective: 600px;
    }

    .cube {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transform: rotateX(0deg) rotateY(0deg);
      transition: transform 0.1s linear;
    }

    .face {
      position: absolute;
      width: 200px;
      height: 200px;
      background: rgba(255, 0, 0, 0.7);
      border: 2px solid #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
    }

    .front  { transform: translateZ(100px); background-color: red; }
    .back   { transform: rotateY(180deg) translateZ(100px); background-color: blue; }
    .right  { transform: rotateY(90deg) translateZ(100px); background-color: green; }
    .left   { transform: rotateY(-90deg) translateZ(100px); background-color: yellow; }
    .top    { transform: rotateX(90deg) translateZ(100px); background-color: cyan; }
    .bottom { transform: rotateX(-90deg) translateZ(100px); background-color: magenta; }
  </style>
</head>
<body>
  <div class="scene">
    <div class="cube" id="cube">
      <div class="face front">Frente</div>
      <div class="face back">Trás</div>
      <div class="face right">Direita</div>
      <div class="face left">Esquerda</div>
      <div class="face top">Topo</div>
      <div class="face bottom">Base</div>
    </div>
  </div>

  <script>
    const cube = document.getElementById('cube');

    // Altere aqui para o IP e porta do servidor WebSocket
    const socket = new WebSocket('wss://localhost:4000');

    socket.onopen = () => {
      console.log("WebSocket conectado à página receptora.");
    };

    socket.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        const { beta = 0, gamma = 0 } = data;

        // Aplica os valores recebidos para rotacionar o cubo
        cube.style.transform = `rotateX(${-beta}deg) rotateY(${gamma}deg)`;
      } catch (e) {
        console.error("Erro ao processar mensagem:", e);
      }
    };

    socket.onerror = (err) => {
      console.error("Erro no WebSocket:", err);
    };
  </script>
</body>
</html>
